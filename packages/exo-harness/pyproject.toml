[project]
name = "exo-harness"
version = "0.1.0"
description = "Orchestration harness for composable agent runtime behavior"
requires-python = ">=3.11"
dependencies = [
    "exo-core>=0.1.0",
]

[tool.uv.sources]
exo-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/exo"]
