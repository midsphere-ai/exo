[project]
name = "exo-server"
version = "0.1.0"
description = "Web UI and API server for Exo agents"
requires-python = ">=3.11"
dependencies = [
    "exo-core",
    "exo-models",
    "fastapi>=0.115",
    "uvicorn>=0.30",
]

[tool.uv.sources]
exo-core = { workspace = true }
exo-models = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/exo_server"]
