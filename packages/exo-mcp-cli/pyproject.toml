[project]
name = "exo-mcp-cli"
version = "0.1.0"
description = "Standalone CLI for interacting with MCP servers"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.0",
    "typer>=0.12",
    "rich>=13.0",
    "cryptography>=42.0",
]

[project.scripts]
exo-mcp = "exo_mcp_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/exo_mcp_cli"]
