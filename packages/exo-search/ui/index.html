<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>exo search</title>
  <link rel="stylesheet" href="/styles.css" />
  <script>
    (function() {
      var stored = localStorage.getItem('theme');
      var preferred = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', preferred);
    })();
  </script>
</head>
<body>

  <div id="app">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="logo">exo<span>search</span></div>
      <button class="new-search-btn" id="newSearchBtn">+ New Search</button>
      <div class="history-list" id="historyList"></div>
      <div class="sidebar-footer">
        <button class="icon-btn" id="themeToggleSidebar" title="Toggle theme">&#9728;</button>
        <button class="icon-btn" id="settingsBtnSidebar" title="Settings">&#9881;</button>
      </div>
    </aside>

    <!-- Main Panel -->
    <div class="main">

      <!-- Top Bar -->
      <div class="top-bar">
        <div class="logo">exo<span>search</span></div>
        <div style="display:flex;gap:0.5rem;align-items:center;">
          <button class="icon-btn" id="themeToggle" title="Toggle theme">&#9728;</button>
          <button class="icon-btn" id="settingsBtn" title="Settings">&#9881;</button>
        </div>
      </div>

      <!-- Landing View -->
      <div class="landing" id="landingView">
        <div class="landing-inner">
          <h1>What do you want to know?</h1>
          <p class="subtitle">AI-powered deep research with cited sources</p>

          <form class="search-bar" id="landingSearchBar">
            <input id="landingInput" type="text" placeholder="Ask anything..." autocomplete="off" />
            <select class="mode-select" id="modeSelect">
              <option value="speed">&#9889; Speed</option>
              <option value="balanced" selected>&#9878; Balanced</option>
              <option value="quality">&#128300; Quality</option>
            </select>
            <button class="submit-btn" type="submit">&rarr;</button>
          </form>

          <div class="suggestions" id="landingSuggestions">
            <button class="suggestion-chip">How does CRISPR gene editing work?</button>
            <button class="suggestion-chip">Latest developments in quantum computing</button>
            <button class="suggestion-chip">Compare React vs Svelte for web apps</button>
            <button class="suggestion-chip">Explain transformer architecture in AI</button>
          </div>
        </div>
      </div>

      <!-- Results View -->
      <div class="results-view" id="resultsView">
        <div class="results-header">
          <div class="query-title" id="queryTitle"></div>
          <div class="mode-badge" id="modeBadge">&#9878; Balanced</div>
        </div>
        <div class="answer-area" id="answerArea">
          <div class="answer-content" id="answerContent"></div>
        </div>
        <div class="bottom-input">
          <form class="search-bar" id="followUpBar">
            <input id="followUpInput" type="text" placeholder="Ask a follow-up..." autocomplete="off" />
            <select class="mode-select" id="modeSelectFollowUp">
              <option value="speed">&#9889; Speed</option>
              <option value="balanced" selected>&#9878; Balanced</option>
              <option value="quality">&#128300; Quality</option>
            </select>
            <button class="submit-btn" type="submit">&rarr;</button>
          </form>
        </div>
      </div>

    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Settings</h2>
        <button type="button" class="modal-close" id="settingsClose">&#10005;</button>
      </div>
      <div class="modal-subtitle">Configure your search backends and AI models</div>

      <div class="modal-body">
        <!-- Web Search Card -->
        <div class="settings-card">
          <div class="settings-card-header">
            <div class="settings-icon" style="background: color-mix(in srgb, var(--zen-blue) 12%, var(--zen-paper));">&#128269;</div>
            <div class="settings-card-title">Web Search</div>
          </div>
          <div class="toggle-pills" id="searchBackendToggle">
            <button type="button" class="pill active" data-value="serper">Serper</button>
            <button type="button" class="pill" data-value="searxng">SearXNG</button>
          </div>
          <div id="serperFields">
            <div class="input-password-wrap">
              <input type="password" class="settings-input" id="serperApiKey" placeholder="Serper API Key">
              <button type="button" class="password-toggle" data-target="serperApiKey" title="Show/hide">👁</button>
            </div>
          </div>
          <div id="searxngFields" style="display:none;">
            <input type="text" class="settings-input" id="searxngUrl" placeholder="http://localhost:8888">
          </div>
        </div>

        <!-- Page Reader Card -->
        <div class="settings-card">
          <div class="settings-card-header">
            <div class="settings-icon" style="background: color-mix(in srgb, var(--zen-green) 12%, var(--zen-paper));">&#128196;</div>
            <div class="settings-card-title">Page Reader</div>
          </div>
          <div class="toggle-pills" id="enrichmentToggle">
            <button type="button" class="pill active" data-value="jina-cloud">Jina Cloud</button>
            <button type="button" class="pill" data-value="jina-self">Self-hosted</button>
          </div>
          <div id="jinaCloudFields">
            <div class="input-password-wrap">
              <input type="password" class="settings-input" id="jinaApiKey" placeholder="Jina API Key">
              <button type="button" class="password-toggle" data-target="jinaApiKey" title="Show/hide">👁</button>
            </div>
          </div>
          <div id="jinaSelfFields" style="display:none;">
            <input type="text" class="settings-input" id="jinaReaderUrl" placeholder="http://127.0.0.1:3000">
          </div>
        </div>

        <!-- AI Models Card -->
        <div class="settings-card">
          <div class="settings-card-header">
            <div class="settings-icon" style="background: color-mix(in srgb, var(--zen-coral) 12%, var(--zen-paper));">&#129504;</div>
            <div class="settings-card-title">AI Models</div>
          </div>
          <div class="settings-row">
            <div class="settings-field">
              <label class="settings-label">Model</label>
              <input type="text" class="settings-input" id="modelInput" placeholder="openai:gpt-4o">
            </div>
            <div class="settings-field">
              <label class="settings-label">Fast Model</label>
              <input type="text" class="settings-input" id="fastModelInput" placeholder="openai:gpt-4o-mini">
            </div>
          </div>
          <div class="settings-field">
            <label class="settings-label">API Key</label>
            <div class="input-password-wrap">
              <input type="password" class="settings-input" id="llmApiKey" placeholder="Provider API key">
              <button type="button" class="password-toggle" data-target="llmApiKey" title="Show/hide">👁</button>
            </div>
          </div>
          <div class="settings-row">
            <div class="settings-field">
              <label class="settings-label">Base URL <span style="color:var(--zen-muted);font-weight:400">(optional)</span></label>
              <input type="text" class="settings-input" id="baseUrl" placeholder="https://api.openai.com/v1">
            </div>
            <div class="settings-field">
              <label class="settings-label">Embedding Model</label>
              <input type="text" class="settings-input" id="embeddingModel" placeholder="text-embedding-3-small">
            </div>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-secondary" id="settingsCancel">Cancel</button>
        <button type="button" class="btn-primary" id="settingsSave">Save</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
