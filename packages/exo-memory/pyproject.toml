[project]
name = "exo-memory"
version = "0.1.0"
description = "Memory backends: in-memory, SQLite, Postgres, vector search"
requires-python = ">=3.11"
dependencies = [
    "exo-core",
]

[project.optional-dependencies]
sqlite = ["aiosqlite>=0.20"]
postgres = ["asyncpg>=0.29"]
vector = ["chromadb>=0.6"]
vertex = ["google-genai>=1.0", "google-auth>=2.0"]

[tool.uv.sources]
exo-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/exo"]
