[project]
name = "exo-web"
version = "0.1.0"
description = "Exo Web — AI agent platform UI and API server"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "aiosqlite>=0.20",
    "bcrypt>=4.0",
    "cryptography>=42.0",
    "croniter>=2.0",
    "httpx>=0.27",
    "exo-core",
    "exo-models",
]

[tool.uv.sources]
exo-core = { workspace = true }
exo-models = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/exo_web"]
