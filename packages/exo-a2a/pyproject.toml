[project]
name = "exo-a2a"
version = "0.1.0"
description = "Agent-to-Agent protocol for inter-agent communication"
requires-python = ">=3.11"
dependencies = [
    "exo-core",
    "httpx>=0.27",
]

[tool.uv.sources]
exo-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/exo"]
