[project]
name = "exo-skills"
version = "0.1.0"
description = "Skill source watchers for Exo hot-reloading"
requires-python = ">=3.11"
dependencies = [
    "exo-core>=0.1.0",
    "watchfiles>=1.0",
]

[tool.uv.sources]
exo-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/exo_skills"]
