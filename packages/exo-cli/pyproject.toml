[project]
name = "exo-cli"
version = "0.1.0"
description = "CLI agent runner for Exo"
requires-python = ">=3.11"
dependencies = [
    "exo-core",
    "exo-distributed",
    "exo-models",
    "typer>=0.12",
    "rich>=13.0",
]

[project.scripts]
exo = "exo_cli.main:app"

[tool.uv.sources]
exo-core = { workspace = true }
exo-distributed = { workspace = true }
exo-models = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/exo_cli"]
