[project]
name = "exo-models"
version = "0.1.0"
description = "LLM provider abstractions for OpenAI, Anthropic, and compatible APIs"
requires-python = ">=3.11"
dependencies = [
    "exo-core",
    "openai>=1.0",
    "anthropic>=0.39",
    "google-genai>=1.0",
    "google-auth>=2.0",
]

[tool.uv.sources]
exo-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/exo"]
